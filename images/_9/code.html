<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
              "primary": "#7DD3FC",
              "on-primary": "#0f172a",
              "primary-container": "#e0f2fe",
              "on-primary-container": "#0369a1",
              "surface": "#ffffff",
              "on-surface": "#0f172a",
              "surface-variant": "#f1f5f9",
              "on-surface-variant": "#475569",
              "outline": "#94a3b8",
              "outline-variant": "#e2e8f0",
              "error": "#ef4444",
              "error-container": "#fee2e2",
              "on-error-container": "#991b1b"
            },
            "fontFamily": {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            }
          },
        },
      }
</script>
<style>
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .glass-card {
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.8);
        box-shadow: 0 8px 32px rgba(125, 211, 252, 0.15);
    }
    .glass-nav {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(226, 232, 240, 0.6);
    }
    .glass-bottom-nav {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-top: 1px solid rgba(226, 232, 240, 0.6);
    }
    body {
      min-height: max(884px, 100dvh);
      background-image: radial-gradient(circle at top right, #e0f2fe 0%, #ffffff 40%, #ffffff 100%);
      background-attachment: fixed;
    }
</style>
</head>
<body class="font-body text-on-surface min-h-screen pb-24">
<!-- TopAppBar -->
<header class="glass-nav top-0 sticky z-40 flex justify-between items-center px-6 h-20 w-full">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#38bdf8]" data-icon="water_drop">water_drop</span>
<h1 class="font-['Manrope'] font-bold text-xl tracking-tight text-slate-800">入河排污口勘查系统</h1>
</div>
<div class="flex items-center gap-4">
<div class="hidden md:flex gap-6">
<a class="text-[#0ea5e9] border-b-4 border-[#38bdf8] font-medium py-7" href="#">动态勘察</a>
<a class="text-slate-500 hover:text-slate-800 transition-colors font-medium py-7 px-2" href="#">地图中心</a>
<a class="text-slate-500 hover:text-slate-800 transition-colors font-medium py-7 px-2" href="#">审核中心</a>
</div>
<div class="w-10 h-10 rounded-full bg-slate-100 border border-slate-200 overflow-hidden shadow-sm">
<img alt="User" data-alt="professional male inspector avatar in a technical uniform with a neutral background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDfwjolFTjudCd-yabaE35L2qOq2ur91l7t-ZwNOEpxEMeCFWVJ4-p1Z_kPGFzzqpiA7Wbah_jLOV0EA2pAMn2TtuSTEuawNAjx1DKTDe8fAd_VOcfdIvxhZqWecsuY2zJ4Eew6xDd_1WPgUw6_ciyF4TxavcdtFXInKIdQXe_FUB8p7rYkhaWtZD-Bn3lVfyYfoLM3ExveSAgnlmxZxHCSwHHvDd-81ISlILbjzKh2J39t-tsNAqoDQV9TThFKYfpKvJqkpUNR-fg"/>
</div>
</div>
</header>
<!-- Status Bar (Draft Saved) -->
<div class="bg-[#e0f2fe]/60 backdrop-blur-md border-b border-sky-100 text-sky-800 px-6 py-2 flex items-center justify-between text-sm font-medium">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]" data-icon="cloud_done">cloud_done</span>
<span>草稿已本地保存</span>
</div>
<span class="opacity-70 text-xs">刚刚</span>
</div>
<main class="max-w-3xl mx-auto px-4 py-8 relative z-10">
<!-- Editorial Header Section -->
<section class="mb-10">
<div class="flex items-end justify-between mb-2">
<h2 class="font-headline text-4xl font-extrabold tracking-tight text-slate-800">新增勘察记录</h2>
<span class="bg-primary text-slate-900 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider shadow-sm">In Progress</span>
</div>
<p class="text-slate-500 body-md max-w-lg mt-3">请详细填写当前排污口的现场状况。系统将自动记录GPS坐标与当前环境参数。</p>
</section>
<!-- Dynamic Form Body -->
<form class="space-y-8">
<!-- Basic Info Section -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Input Card -->
<div class="glass-card p-6 rounded-2xl space-y-4">
<label class="block text-sm font-bold text-slate-600 tracking-wide">排口名称</label>
<input class="w-full bg-white/80 border border-slate-200 rounded-xl h-14 px-4 focus:ring-2 focus:ring-primary focus:border-primary transition-all text-slate-800 placeholder:text-slate-400 shadow-inner" placeholder="请输入排口唯一编码或名称" type="text"/>
</div>
<!-- Select Card -->
<div class="glass-card p-6 rounded-2xl space-y-4">
<label class="block text-sm font-bold text-slate-600 tracking-wide">排口类型</label>
<div class="relative">
<select class="w-full bg-white/80 border border-slate-200 rounded-xl h-14 px-4 appearance-none focus:ring-2 focus:ring-primary focus:border-primary transition-all text-slate-800 shadow-inner">
<option>工业排口</option>
<option>生活污水排口</option>
<option>混合排口</option>
<option>雨污合流排口</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-4 text-slate-400 pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
<!-- Logic Dependent Section -->
<div class="glass-card p-1 rounded-3xl">
<div class="bg-white/40 p-8 rounded-[1.5rem] space-y-8">
<div>
<label class="block text-sm font-bold text-slate-600 tracking-wide mb-6">供电方式</label>
<div class="grid grid-cols-2 gap-4">
<label class="relative flex items-center justify-center p-4 border-2 border-slate-200 rounded-2xl cursor-pointer hover:bg-white/60 transition-colors has-[:checked]:border-primary has-[:checked]:bg-primary/10 bg-white/40">
<input class="sr-only" name="power" type="radio" value="main"/>
<div class="flex flex-col items-center gap-2">
<span class="material-symbols-outlined text-3xl text-slate-500" data-icon="electric_bolt">electric_bolt</span>
<span class="font-bold text-slate-600">市电</span>
</div>
</label>
<label class="relative flex items-center justify-center p-4 border-2 border-primary rounded-2xl cursor-pointer bg-primary/10 shadow-sm">
<input checked="" class="sr-only" name="power" type="radio" value="solar"/>
<div class="flex flex-col items-center gap-2">
<span class="material-symbols-outlined text-3xl text-[#0284c7]" data-icon="wb_sunny">wb_sunny</span>
<span class="font-bold text-[#0284c7]">太阳能</span>
</div>
<div class="absolute top-2 right-2">
<span class="material-symbols-outlined text-primary text-xl" data-icon="check_circle" data-weight="fill">check_circle</span>
</div>
</label>
</div>
</div>
<!-- Logic Linkage: Appears when Solar is selected -->
<div class="space-y-4 animate-in fade-in slide-in-from-top-4 duration-500 bg-white/50 p-5 rounded-2xl border border-slate-100">
<div class="flex items-center gap-2">
<div class="h-1.5 w-8 bg-primary rounded-full"></div>
<label class="text-sm font-bold text-slate-700 tracking-wide">日照条件勘察</label>
</div>
<div class="relative mt-2">
<select class="w-full bg-white/80 border border-slate-200 rounded-xl h-14 px-4 appearance-none focus:ring-2 focus:ring-primary transition-all text-slate-800 shadow-inner">
<option>优 (全天无遮挡)</option>
<option>良 (部分时段遮挡)</option>
<option>差 (严重遮挡，不建议安装)</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-4 text-slate-400 pointer-events-none" data-icon="wb_irradiance">wb_shade</span>
</div>
</div>
</div>
</div>
<!-- Upload Section -->
<div class="glass-card p-8 rounded-3xl border border-slate-200">
<div class="flex flex-col items-center text-center space-y-4">
<div class="w-16 h-16 rounded-full bg-primary/20 flex items-center justify-center text-[#0284c7] shadow-sm">
<span class="material-symbols-outlined text-3xl" data-icon="photo_camera">photo_camera</span>
</div>
<div>
<h3 class="font-bold text-lg text-slate-800">现场照片上传</h3>
<p class="text-slate-500 text-sm mt-1">请拍摄排口全景、设备近景及周边环境</p>
</div>
<div class="flex gap-4 w-full mt-4">
<div class="flex-1 aspect-square rounded-2xl bg-slate-100 overflow-hidden relative group shadow-sm border border-slate-200">
<img alt="Inspection photo" class="w-full h-full object-cover" data-alt="close-up of industrial water discharge pipe into a river with visible water flow and concrete structure" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCTQZ7NLtbU59voOnFYD_a7kynYHyixxrQfCTawMi-vFojoG9t9Tx1PAm5cENdEhMwUX9TOZ16j8BccMYz7F460xl-SvFwjUUIROn0FDFeguzc26bSEW_qwdN6roD7jQfsQ2tU461GW8G0IkyvdkGq2b-LgrbA-aIX6PtCIBrypcRfS0dlWYWrTp3I-E2Zt3lyWsZ8CAJMDyOi1myJVlfmoVr1YSMaD5-2Pf68yqvikZi4RsIIvrGSE3SgGHSXyW8bE7LBJ98BKLjk"/>
<button class="absolute top-2 right-2 bg-red-500/90 text-white p-1.5 rounded-full shadow-lg opacity-0 group-hover:opacity-100 transition-opacity backdrop-blur-sm">
<span class="material-symbols-outlined text-sm" data-icon="close">close</span>
</button>
</div>
<button class="flex-1 aspect-square rounded-2xl bg-white/60 border-2 border-dashed border-slate-300 flex flex-col items-center justify-center gap-2 hover:bg-white/80 transition-colors shadow-sm" type="button">
<span class="material-symbols-outlined text-3xl text-slate-400" data-icon="add_a_photo">add_a_photo</span>
<span class="text-xs font-bold text-slate-500">调用相机</span>
</button>
</div>
<p class="text-red-500 text-xs font-medium bg-red-50/80 px-3 py-1.5 rounded-lg mt-2 inline-block backdrop-blur-sm">※ 强制开启相机拍摄，不支持从相册选择</p>
</div>
</div>
</form>
</main>
<!-- Bottom Actions -->
<div class="glass-bottom-nav fixed bottom-0 left-0 w-full p-4 z-50">
<div class="max-w-3xl mx-auto flex gap-4">
<button class="flex-1 h-14 rounded-2xl font-bold text-slate-600 bg-white/80 border border-slate-200 hover:bg-slate-50 transition-all shadow-sm active:scale-95">
                暂存草稿
            </button>
<button class="flex-[2] h-14 rounded-2xl font-bold text-slate-900 bg-primary shadow-lg shadow-primary/30 hover:opacity-90 transition-all active:scale-95 flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="cloud_upload">cloud_upload</span>
                提交审核
            </button>
</div>
</div>
<!-- Mobile Bottom Navigation (Visible on small screens) -->
<nav class="glass-bottom-nav fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 pb-safe md:hidden shadow-[0_-8px_24px_rgba(125,211,252,0.1)]">
<div class="flex flex-col items-center justify-center text-slate-500 p-2">
<span class="material-symbols-outlined" data-icon="explore">explore</span>
<span class="font-['Inter'] text-[10px] uppercase font-bold mt-1">地图</span>
</div>
<div class="flex flex-col items-center justify-center bg-primary text-slate-900 rounded-xl p-2 px-4 shadow-sm mb-1">
<span class="material-symbols-outlined" data-icon="edit_note">edit_note</span>
<span class="font-['Inter'] text-[10px] uppercase font-bold mt-1">勘察</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-500 p-2">
<span class="material-symbols-outlined" data-icon="verified">verified</span>
<span class="font-['Inter'] text-[10px] uppercase font-bold mt-1">审核</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-500 p-2">
<span class="material-symbols-outlined" data-icon="query_stats">query_stats</span>
<span class="font-['Inter'] text-[10px] uppercase font-bold mt-1">看板</span>
</div>
</nav>
</body></html>
