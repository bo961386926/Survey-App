<option>地籍边界勘查</option>
<option>施工进度核实</option>
<option>地质灾害巡检</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant px-1">现场描述</label>
<textarea class="w-full p-4 bg-white border border-[#E0F0FF] rounded-lg focus:border-primary focus:ring-1 focus:ring-primary outline-none text-on-surface font-body-sm resize-none" placeholder="请输入勘察现场的详细情况说明..." rows="3"></textarea>
