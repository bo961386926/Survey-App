<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-variant": "#d8e3fb",
                    "secondary": "#50616b",
                    "background": "#f9f9ff",
                    "outline": "#6f787e",
                    "primary-container": "#7dd3fc",
                    "on-background": "#111c2d",
                    "on-tertiary-fixed-variant": "#3f484d",
                    "tertiary-container": "#c1cad0",
                    "surface-dim": "#cfdaf2",
                    "surface-container-low": "#f0f3ff",
                    "error": "#ba1a1a",
                    "secondary-fixed": "#d3e5f1",
                    "tertiary-fixed": "#dbe4ea",
                    "on-error": "#ffffff",
                    "on-secondary-fixed-variant": "#384953",
                    "outline-variant": "#bec8ce",
                    "on-primary-fixed-variant": "#004d66",
                    "inverse-primary": "#7bd1fa",
                    "primary-fixed-dim": "#7bd1fa",
                    "primary": "#006686",
                    "primary-fixed": "#c0e8ff",
                    "inverse-surface": "#263143",
                    "surface-container-highest": "#d8e3fb",
                    "surface": "#f9f9ff",
                    "on-primary-fixed": "#001e2b",
                    "on-primary": "#ffffff",
                    "surface-bright": "#f9f9ff",
                    "error-container": "#ffdad6",
                    "on-secondary-container": "#566771",
                    "tertiary-fixed-dim": "#bfc8ce",
                    "on-surface": "#111c2d",
                    "secondary-container": "#d3e5f1",
                    "on-tertiary": "#ffffff",
                    "on-error-container": "#93000a",
                    "on-tertiary-container": "#4c555a",
                    "tertiary": "#576065",
                    "surface-container-high": "#dee8ff",
                    "on-surface-variant": "#3f484e",
                    "secondary-fixed-dim": "#b7c9d5",
                    "on-tertiary-fixed": "#141d21",
                    "surface-container": "#e7eeff",
                    "on-secondary-fixed": "#0c1e26",
                    "surface-container-lowest": "#ffffff",
                    "surface-tint": "#006686",
                    "inverse-on-surface": "#ecf1ff",
                    "on-primary-container": "#005b78",
                    "on-secondary": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "sm": "8px",
                    "unit": "4px",
                    "lg": "24px",
                    "md": "16px",
                    "container-margin": "32px",
                    "xs": "4px",
                    "gutter": "20px",
                    "xl": "40px"
            },
            "fontFamily": {
                    "body-main": ["Manrope"],
                    "label-sm": ["Manrope"],
                    "display-lg": ["Manrope"],
                    "headline-md": ["Manrope"]
            },
            "fontSize": {
                    "body-main": ["16px", {"lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400"}],
                    "label-sm": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "500"}],
                    "display-lg": ["48px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-md": ["24px", {"lineHeight": "1.4", "letterSpacing": "-0.01em", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        .glass-bg {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .ice-border {
            border: 1px solid rgba(125, 211, 252, 0.15);
        }
        .gradient-text {
            background: linear-gradient(135deg, #006686 0%, #7dd3fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .active-card {
            background: rgba(125, 211, 252, 0.1);
            border-color: #7dd3fc;
        }
        body {
            background-color: #f9f9ff;
            font-family: 'Manrope', sans-serif;
            overflow-x: hidden;
        }
        .input-focus-effect:focus-within {
            border-bottom-color: #7dd3fc;
            box-shadow: 0 4px 12px -4px rgba(125, 211, 252, 0.3);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- Top AppBar (From Shared Components Logic) -->
<header class="bg-white/70 backdrop-blur-2xl text-sky-400 font-['Manrope'] font-medium tracking-tight docked full-width top-0 sticky border-b border-sky-100/20 z-50 flat no-shadows h-16 flex justify-between items-center px-4">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant cursor-pointer" data-icon="arrow_back">arrow_back</span>
</div>
<h1 class="text-lg font-bold text-slate-900">入河排污口勘察</h1>
<div class="w-8 h-8 rounded-full overflow-hidden border border-sky-100">
<img alt="Profile" class="w-full h-full object-cover" data-alt="Professional headshot of a male engineer in a clean white background, soft studio lighting, high quality portrait" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAixu0kzVnM6BR0mqhoPpcdu1WzCVeaWelcKuEyc2gaOzHF_5KDqgx1XfaF2XwUXtWMrb9GpnqzuZNXkBLHklXpOfuFj1TWWzsZg1ymP2ZUJ7_QHlaYHqH08s_2BgGRddA8hnLkPGG2V8bOX8CPNdfY-aUqXwNSwkWGFdSgcgsoILOE3GO_pYCweoCvxCJ7EaIZlMBSqk9pjhVos0n8GKaZSvReopvl479XFFHiv-xPehytQJi55WvHGltpXVWylBa1n58s_YBQ5kw"/>
</div>
</header>
<main class="flex-grow px-container-margin py-lg flex flex-col gap-xl">
<!-- Welcome Section -->
<section class="flex flex-col gap-sm">
<h2 class="font-headline-md text-headline-md text-on-background tracking-tight">账号注册</h2>
<p class="font-body-main text-secondary opacity-70">请完善您的个人资料以申请系统权限</p>
</section>
<!-- Form Section -->
<section class="flex flex-col gap-lg">
<!-- Personal Info Inputs -->
<div class="flex flex-col gap-md">
<!-- Real Name -->
<div class="flex flex-col gap-xs border-b border-outline-variant/30 py-2 transition-all input-focus-effect">
<label class="font-label-sm text-label-sm text-secondary uppercase tracking-wider">真实姓名</label>
<input class="bg-transparent border-none focus:ring-0 font-body-main text-on-surface px-0 py-1 placeholder:text-outline-variant" placeholder="输入您的姓名" type="text"/>
</div>
<!-- Phone Number -->
<div class="flex flex-col gap-xs border-b border-outline-variant/30 py-2 transition-all input-focus-effect">
<label class="font-label-sm text-label-sm text-secondary uppercase tracking-wider">手机号码</label>
<div class="flex justify-between items-center">
<input class="bg-transparent border-none focus:ring-0 font-body-main text-on-surface px-0 py-1 w-full placeholder:text-outline-variant" placeholder="输入11位手机号" type="tel"/>
<button class="text-primary font-label-sm whitespace-nowrap px-sm py-xs bg-primary-fixed/30 rounded-lg hover:bg-primary-fixed/50 transition-colors">获取验证码</button>
</div>
</div>
<!-- Auth Code -->
<div class="flex flex-col gap-xs border-b border-outline-variant/30 py-2 transition-all input-focus-effect">
<label class="font-label-sm text-label-sm text-secondary uppercase tracking-wider">验证码</label>
<input class="bg-transparent border-none focus:ring-0 font-body-main text-on-surface px-0 py-1 placeholder:text-outline-variant" placeholder="输入6位验证码" type="number"/>
</div>
<!-- Department Selection -->
<div class="flex flex-col gap-xs border-b border-outline-variant/30 py-2 transition-all input-focus-effect">
<label class="font-label-sm text-label-sm text-secondary uppercase tracking-wider">所属部门</label>
<div class="flex justify-between items-center cursor-pointer">
<span class="font-body-main text-outline-variant">请选择所属环保局/机构</span>
<span class="material-symbols-outlined text-secondary" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
<!-- Role Selection Cards -->
<div class="flex flex-col gap-md">
<h3 class="font-label-sm text-label-sm text-secondary uppercase tracking-wider">申请角色</h3>
<div class="grid grid-cols-2 gap-md">
<!-- Role Card 1 -->
<div class="ice-border rounded-xl p-md flex flex-col gap-sm relative glass-bg transition-all active-card">
<div class="absolute top-2 right-2">
<span class="material-symbols-outlined text-primary text-md" data-icon="check_circle" data-weight="fill">check_circle</span>
</div>
<div class="w-10 h-10 rounded-lg bg-primary-fixed/40 flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="edit_square">edit_square</span>
</div>
<div>
<p class="font-headline-md text-sm text-on-surface">现场勘察员</p>
<p class="font-label-sm text-[10px] text-secondary/60 leading-tight mt-1">负责实地排口信息采集与照片上传</p>
</div>
</div>
<!-- Role Card 2 -->
<div class="ice-border rounded-xl p-md flex flex-col gap-sm relative glass-bg transition-all hover:bg-primary-fixed/10">
<div class="w-10 h-10 rounded-lg bg-surface-container flex items-center justify-center text-secondary">
<span class="material-symbols-outlined" data-icon="assignment_turned_in">assignment_turned_in</span>
</div>
<div>
<p class="font-headline-md text-sm text-on-surface">审计核查员</p>
<p class="font-label-sm text-[10px] text-secondary/60 leading-tight mt-1">负责勘察结果审核与数据质量控制</p>
</div>
</div>
</div>
</div>
</section>
<!-- Submit Button Container -->
<div class="mt-lg mb-xl">
<button class="w-full h-14 bg-gradient-to-r from-primary to-primary-container text-white rounded-2xl font-headline-md text-lg shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                提交申请
                <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
<p class="text-center font-label-sm text-secondary/40 mt-md">点击提交即视为同意《用户服务协议》</p>
</div>
</main>
<!-- Bottom Navigation Shell (Suppressed based on Transactional Intent - Mocking restricted shell) -->
<!-- This is a registration page, BottomNavBar should be suppressed as per "The Destination Rule" -->
<!-- Background Decoration -->
<div class="fixed top-0 right-0 -z-10 w-64 h-64 bg-primary-container/10 blur-[100px] rounded-full"></div>
<div class="fixed bottom-0 left-0 -z-10 w-80 h-80 bg-secondary-container/10 blur-[120px] rounded-full"></div>
</body></html>
