<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>

                        "primary-fixed": "#c0e8ff",

                        "surface": "#f9f9ff",

                        "on-primary": "#ffffff",

                    "fontFamily": {
                        "body-main": ["Manrope"],
                        "label-sm": ["Manrope"],

<style>
        body { font-family: 'Manrope', sans-serif; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(224, 242, 254, 0.5);
        }
        .ice-gradient-btn {
            background: linear-gradient(135deg, #7dd3fc 0%, #38bdf8 100%);
        }
        .input-underline::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(to right, #e0f2fe, #7dd3fc, #e0f2fe);
            transform: scaleX(0.3);
            transition: transform 0.4s ease;
        }
        .input-container:focus-within .input-underline::after {
            transform: scaleX(1);
        }
        .liquid-progress {
            background: linear-gradient(90deg, transparent, rgba(125, 211, 252, 0.4), transparent);
            background-size: 200% 100%;
            animation: flow 3s infinite linear;
        }
        @keyframes flow {
            0% { background-position: 100% 0; }
            100% { background-position: -100% 0; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface selection:bg-primary-container/30 overflow-hidden text-on-surface">
<!-- Background Decorative Elements -->
<div class="fixed inset-0 -z-10 overflow-hidden">
<div class="absolute top-[-10%] left-[-10%] w-[60%] h-[40%] rounded-full bg-primary-container/10 blur-[120px]"></div>
<div class="absolute bottom-[-5%] right-[-5%] w-[50%] h-[50%] rounded-full bg-secondary-container/20 blur-[100px]"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative flex flex-col items-center justify-between min-h-screen px-lg pt-xl pb-lg">
<!-- Brand & Welcome Section -->
<header class="w-full text-center flex flex-col items-center mt-lg">
<div class="w-20 h-20 mb-lg flex items-center justify-center rounded-3xl glass-panel relative overflow-hidden">
<div class="absolute inset-0 liquid-progress"></div>
<span class="material-symbols-outlined text-primary text-4xl relative z-10" data-icon="waves" data-weight="fill">waves</span>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface tracking-tight mb-xs">入河排污口勘察</h1>
<p class="font-body-main text-secondary opacity-60 text-sm">智慧亳州 · 守护清流</p>
</header>
<!-- Login Form Container -->
<section class="w-full max-w-sm mb-auto mt-xl">
<div class="space-y-xl">
<!-- Input: Account -->
<div class="input-container relative group">
<label class="block text-label-sm font-label-sm text-secondary mb-sm ml-xs opacity-70">工号 / 手机号</label>
<div class="relative flex items-center px-xs py-md">
<span class="material-symbols-outlined text-outline-variant mr-md" data-icon="person">person</span>
<input class="w-full bg-transparent border-none focus:ring-0 p-0 text-on-surface placeholder:text-outline-variant font-body-main" placeholder="请输入您的账号" type="text"/>
<div class="input-underline absolute bottom-0 left-0 w-full h-px bg-outline-variant/20"></div>
</div>
</div>
<!-- Input: Password -->
<div class="input-container relative group">
<label class="block text-label-sm font-label-sm text-secondary mb-sm ml-xs opacity-70">访问密码</label>
<div class="relative flex items-center px-xs py-md">
<span class="material-symbols-outlined text-outline-variant mr-md" data-icon="lock">lock</span>
<input class="w-full bg-transparent border-none focus:ring-0 p-0 text-on-surface placeholder:text-outline-variant font-body-main" placeholder="请输入密码" type="password"/>
<button class="text-outline-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
<div class="input-underline absolute bottom-0 left-0 w-full h-px bg-outline-variant/20"></div>
</div>
</div>
<!-- Submit Button -->
<div class="pt-md">
<button class="ice-gradient-btn w-full h-14 rounded-2xl text-on-primary font-headline-md shadow-xl shadow-primary-container/20 active:scale-[0.98] transition-all flex items-center justify-center gap-sm">
<span>立即登录</span>
<span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<!-- Secondary Actions -->
<div class="flex justify-between items-center px-xs">
<a class="text-label-sm font-label-sm text-secondary hover:text-primary transition-colors flex items-center" href="#">
<span class="material-symbols-outlined text-sm mr-xs" data-icon="person_add">person_add</span>
                        账号注册
                    </a>
<a class="text-label-sm font-label-sm text-secondary hover:text-primary transition-colors" href="#">
                        找回密码?
                    </a>
</div>
</div>
</section>
<!-- Bottom Footer Illustration / Map Abstract -->
<footer class="w-full mt-xl pointer-events-none">
<div class="w-full h-32 rounded-3xl overflow-hidden glass-panel opacity-60">
<div class="w-full h-full relative">
<img alt="Abstract map" class="w-full h-full object-cover mix-blend-overlay grayscale contrast-125" data-alt="Abstract aerial view of river delta with flowing blue water patterns and soft ice blue atmospheric lighting minimalism" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBsKPDPla8KLoaH507xhNyc6ry9hqwy1dmqAFBxXnhLND8V39iYamV2GFWKr_pnTt7Nf-eKIcbaN9bJQm2B5RRUgE4VneRe-wZPLwGxhl5onRKsr22mSb81R7qAdWx5W6dh_VPB_s-UoJ0wL9grpcTkAT09YVFA55r28SeccDyZLyYnQGm6SIBmURqvbqJ0f3OnkllZfSUJ2oTuVYcJ4blSfzti1oKKxyV8gcVz-IYWLrri8Xj2-8DwgyQlMPg4WQP5cORBVziSUkg"/>
<div class="absolute inset-0 bg-gradient-to-t from-surface to-transparent"></div>
</div>
</div>
<div class="mt-lg text-center">
<p class="text-[10px] font-label-sm text-outline-variant uppercase tracking-widest">Digital River Monitoring System v2.4</p>
</div>
</footer>
</main>
<!-- Visual Polish: Subtle Grain Texture Overlay -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] mix-blend-multiply bg-[url('https://www.transparenttextures.com/patterns/graphy.png')]"></div>
</body></html>
