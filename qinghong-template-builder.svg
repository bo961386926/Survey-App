<svg width="1600" height="1120" viewBox="0 0 1600 1120" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1120" gradientUnits="userSpaceOnUse"><stop stop-color="#F3F7FC"/><stop offset="1" stop-color="#EAF3FF"/></linearGradient>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#9BB7E680"/></filter>
</defs>
<rect width="1600" height="1120" fill="url(#bg)"/>
<rect x="0" y="0" width="96" height="1120" fill="#2C3E50"/>
<rect x="24" y="28" width="48" height="48" rx="14" fill="#1664FF"/><text x="48" y="59" text-anchor="middle" fill="white" font-size="24" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-weight="700">青</text>
<rect x="24" y="252" width="48" height="48" rx="14" fill="#EEF4FF"/>
<rect x="120" y="28" width="1452" height="84" rx="24" fill="#FFFFFF" filter="url(#shadow)"/>
<text x="156" y="62" fill="#1F2D3D" font-size="30" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-weight="700">动态模板设计器</text>
<text x="156" y="88" fill="#7B8794" font-size="15" font-family="Microsoft YaHei, PingFang SC, sans-serif">通过可视化拖拽与联动规则配置，支撑不同排口类型的现场表单</text>
<rect x="1318" y="40" width="92" height="44" rx="14" fill="#E8F3FF"/><text x="1364" y="67" text-anchor="middle" fill="#1664FF" font-size="15" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-weight="700">预览</text>
<rect x="1422" y="40" width="118" height="44" rx="14" fill="#1664FF"/><text x="1481" y="67" text-anchor="middle" fill="white" font-size="15" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-weight="700">发布模板</text>
<rect x="120" y="136" width="284" height="920" rx="26" fill="white" filter="url(#shadow)"/>
<text x="152" y="180" fill="#1F2D3D" font-size="24" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-weight="700">字段组件库</text><text x="152" y="208" fill="#909399" font-size="14" font-family="Microsoft YaHei, PingFang SC, sans-serif">拖入中间画布，支持字段属性和显示规则配置</text>
<rect x="152" y="236" width="220" height="44" rx="14" fill="#E8F3FF"/><text x="182" y="264" fill="#1664FF" font-size="15" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-weight="700">文本输入 Input</text>
<rect x="152" y="292" width="220" height="44" rx="14" fill="#F5F7FA"/><text x="182" y="320" fill="#606266" font-size="15" font-family="Microsoft YaHei, PingFang SC, sans-serif">下拉选择 Select</text>
<rect x="152" y="348" width="220" height="44" rx="14" fill="#F5F7FA"/><text x="182" y="376" fill="#606266" font-size="15" font-family="Microsoft YaHei, PingFang SC, sans-serif">数字 Number</text>
<rect x="152" y="404" width="220" height="44" rx="14" fill="#F5F7FA"/><text x="182" y="432" fill="#606266" font-size="15" font-family="Microsoft YaHei, PingFang SC, sans-serif">开关 Switch</text>
<rect x="152" y="460" width="220" height="44" rx="14" fill="#F5F7FA"/><text x="182" y="488" fill="#606266" font-size="15" font-family="Microsoft YaHei, PingFang SC, sans-serif">图片上传 Image</text>
<rect x="152" y="516" width="220" height="44" rx="14" fill="#F5F7FA"/><text x="182" y="544" fill="#606266" font-size="15" font-family="Microsoft YaHei, PingFang SC, sans-serif">定位坐标 GPS</text>
<rect x="152" y="592" width="220" height="132" rx="18" fill="#F7FAFE" stroke="#E7EDF4"/><text x="176" y="624" fill="#1F2D3D" font-size="16" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-weight="700">模板列表</text><text x="176" y="652" fill="#606266" font-size="13" font-family="Microsoft YaHei, PingFang SC, sans-serif">工业排口标准模板</text><text x="176" y="680" fill="#1664FF" font-size="13" font-family="Microsoft YaHei, PingFang SC, sans-serif">生活排口简化模板</text><text x="176" y="708" fill="#606266" font-size="13" font-family="Microsoft YaHei, PingFang SC, sans-serif">雨水口补采模板</text>
<rect x="432" y="136" width="724" height="920" rx="26" fill="white" filter="url(#shadow)"/>
<text x="464" y="180" fill="#1F2D3D" font-size="24" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-weight="700">模板画布</text><text x="464" y="208" fill="#909399" font-size="14" font-family="Microsoft YaHei, PingFang SC, sans-serif">按移动端实际填写顺序组织字段，减少采集员在现场反复跳转</text>
<rect x="464" y="236" width="660" height="62" rx="18" fill="#F7FAFE"/><text x="492" y="262" fill="#1F2D3D" font-size="16" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-weight="700">模板名称：工业排口标准模板</text><text x="492" y="286" fill="#606266" font-size="13" font-family="Microsoft YaHei, PingFang SC, sans-serif">适用项目：亳州入河排污口项目 · 当前版本 v3 · 已绑定 2 个项目</text>
<rect x="464" y="324" width="660" height="92" rx="20" fill="#FFFFFF" stroke="#DCE8FA"/><text x="492" y="358" fill="#1F2D3D" font-size="17" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-weight="700">排口名称</text><text x="492" y="384" fill="#606266" font-size="13" font-family="Microsoft YaHei, PingFang SC, sans-serif">字段类型：Input · 必填 · 占位：请输入排口名称</text><rect x="1018" y="346" width="74" height="28" rx="14" fill="#E8F3FF"/><text x="1055" y="365" text-anchor="middle" fill="#1664FF" font-size="12" font-family="Microsoft YaHei, PingFang SC, sans-serif">必填</text>
<rect x="464" y="432" width="660" height="106" rx="20" fill="#FFFFFF" stroke="#DCE8FA"/><text x="492" y="466" fill="#1F2D3D" font-size="17" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-weight="700">排口类型</text><text x="492" y="492" fill="#606266" font-size="13" font-family="Microsoft YaHei, PingFang SC, sans-serif">字段类型：Select · 选项：工业 / 生活 / 雨水 / 其他</text><rect x="492" y="506" width="106" height="22" rx="11" fill="#F5F7FA"/><text x="545" y="521" text-anchor="middle" fill="#606266" font-size="11" font-family="Microsoft YaHei, PingFang SC, sans-serif">默认显示</text>
<rect x="464" y="554" width="660" height="136" rx="20" fill="#FFFFFF" stroke="#1664FF" stroke-dasharray="6 5"/><text x="492" y="588" fill="#1F2D3D" font-size="17" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-weight="700">供电方式</text><text x="492" y="614" fill="#606266" font-size="13" font-family="Microsoft YaHei, PingFang SC, sans-serif">字段类型：Select · 选项：市电 / 太阳能</text><rect x="492" y="632" width="214" height="34" rx="17" fill="#EEF5FF"/><text x="599" y="654" text-anchor="middle" fill="#1664FF" font-size="12" font-family="Microsoft YaHei, PingFang SC, sans-serif">联动：当值为“太阳能”时显示下个字段</text>
<rect x="464" y="706" width="660" height="136" rx="20" fill="#F7FBFF" stroke="#DCE8FA"/><text x="492" y="740" fill="#1F2D3D" font-size="17" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-weight="700">日照条件</text><text x="492" y="766" fill="#606266" font-size="13" font-family="Microsoft YaHei, PingFang SC, sans-serif">字段类型：Select · 条件显示字段 · 选项：充足 / 一般 / 差</text><rect x="492" y="784" width="134" height="28" rx="14" fill="#EDF9E8"/><text x="559" y="803" text-anchor="middle" fill="#67C23A" font-size="12" font-family="Microsoft YaHei, PingFang SC, sans-serif">显示规则已生效</text>
<rect x="464" y="858" width="660" height="106" rx="20" fill="#FFFFFF" stroke="#DCE8FA"/><text x="492" y="892" fill="#1F2D3D" font-size="17" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-weight="700">现场照片</text><text x="492" y="918" fill="#606266" font-size="13" font-family="Microsoft YaHei, PingFang SC, sans-serif">字段类型：Image · 限制 9 张 · 必须调用系统相机</text><rect x="950" y="884" width="142" height="28" rx="14" fill="#FFF4E8"/><text x="1021" y="903" text-anchor="middle" fill="#E6A23C" font-size="12" font-family="Microsoft YaHei, PingFang SC, sans-serif">sourceType = camera</text>
<rect x="1184" y="136" width="388" height="920" rx="26" fill="white" filter="url(#shadow)"/>
<text x="1216" y="180" fill="#1F2D3D" font-size="24" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-weight="700">属性与规则</text><text x="1216" y="208" fill="#909399" font-size="14" font-family="Microsoft YaHei, PingFang SC, sans-serif">右侧面板聚焦当前字段的属性设置与联动逻辑</text>
<rect x="1216" y="236" width="324" height="140" rx="18" fill="#F7FAFE"/><text x="1240" y="268" fill="#1F2D3D" font-size="16" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-weight="700">字段属性</text><text x="1240" y="300" fill="#606266" font-size="13" font-family="Microsoft YaHei, PingFang SC, sans-serif">字段 ID：power_type</text><text x="1240" y="328" fill="#606266" font-size="13" font-family="Microsoft YaHei, PingFang SC, sans-serif">标签名：供电方式</text><text x="1240" y="356" fill="#606266" font-size="13" font-family="Microsoft YaHei, PingFang SC, sans-serif">默认值：市电</text>
<rect x="1216" y="392" width="324" height="188" rx="18" fill="#F7FAFE"/><text x="1240" y="424" fill="#1F2D3D" font-size="16" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-weight="700">联动规则编辑</text><text x="1240" y="460" fill="#606266" font-size="13" font-family="Microsoft YaHei, PingFang SC, sans-serif">IF 当前字段值 = 太阳能</text><text x="1240" y="492" fill="#606266" font-size="13" font-family="Microsoft YaHei, PingFang SC, sans-serif">THEN 显示：日照条件</text><text x="1240" y="524" fill="#606266" font-size="13" font-family="Microsoft YaHei, PingFang SC, sans-serif">ELSE 隐藏并清空字段值</text><rect x="1240" y="544" width="132" height="30" rx="15" fill="#1664FF"/><text x="1306" y="564" text-anchor="middle" fill="white" font-size="12" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-weight="700">新增规则条件</text>
<rect x="1216" y="596" width="324" height="158" rx="18" fill="#F7FAFE"/><text x="1240" y="628" fill="#1F2D3D" font-size="16" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-weight="700">模板版本</text><text x="1240" y="660" fill="#1664FF" font-size="13" font-family="Microsoft YaHei, PingFang SC, sans-serif">v3 当前发布版</text><text x="1240" y="688" fill="#606266" font-size="13" font-family="Microsoft YaHei, PingFang SC, sans-serif">v2 2026.04.16 调整照片规则</text><text x="1240" y="716" fill="#606266" font-size="13" font-family="Microsoft YaHei, PingFang SC, sans-serif">v1 2026.04.03 初始模板</text>
<rect x="1216" y="770" width="324" height="250" rx="18" fill="#1664FF"/><text x="1240" y="804" fill="white" font-size="18" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-weight="700">移动端预览摘要</text><text x="1240" y="836" fill="#DCE9FF" font-size="13" font-family="Microsoft YaHei, PingFang SC, sans-serif">画布按 uni-app 填写顺序生成，字段过多时支持懒加载与离线草稿保存。</text><rect x="1240" y="864" width="220" height="132" rx="18" fill="#FFFFFF" opacity="0.95"/><text x="1264" y="894" fill="#1F2D3D" font-size="13" font-family="Microsoft YaHei, PingFang SC, sans-serif">排口名称</text><text x="1264" y="924" fill="#1F2D3D" font-size="13" font-family="Microsoft YaHei, PingFang SC, sans-serif">排口类型</text><text x="1264" y="954" fill="#1F2D3D" font-size="13" font-family="Microsoft YaHei, PingFang SC, sans-serif">供电方式</text><text x="1264" y="984" fill="#1664FF" font-size="13" font-family="Microsoft YaHei, PingFang SC, sans-serif">日照条件（条件显示）</text>
</svg>
