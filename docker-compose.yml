services:
  # ========================================
  # MySQL 数据库
  # ========================================
  mysql:
    image: mysql:8.0
    # 跨平台兼容：Apple Silicon 用户可取消下行注释
    # platform: linux/amd64
    container_name: survey-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-survey_db}
      MYSQL_CHARSET: utf8mb4
      MYSQL_USER: ${DB_USERNAME:-survey_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-survey_password}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-sql/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
      - ./init-sql/offline_data_sync.sql:/docker-entrypoint-initdb.d/01-offline-data-sync.sql:ro
      - ./admin-backend/src/main/resources/db/project_member.sql:/docker-entrypoint-initdb.d/02-project-member.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max-connections=${DB_MAX_CONNECTIONS:-200}
      - --innodb-buffer-pool-size=${DB_BUFFER_POOL:-256M}
      - --skip-name-resolve
      - --log-bin=mysql-bin
      - --binlog-format=row
    networks:
      - survey-network
    healthcheck:
      # 直接使用 Compose 展开的密码，避免容器内健康检查拿到空值
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p${DB_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ========================================
  # Redis 缓存
  # ========================================
  redis:
    image: redis:7-alpine
    # 跨平台兼容：Apple Silicon 用户可取消下行注释
    # platform: linux/amd64
    container_name: survey-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_password}
      --maxmemory ${REDIS_MAX_MEMORY:-128mb}
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis-data:/data
    networks:
      - survey-network
    healthcheck:
      # 直接使用 Compose 展开的密码，避免容器内健康检查拿到空值
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-redis_password} ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ========================================
  # 后端服务
  # ========================================
  admin-backend:
    build:
      context: ./admin-backend
      dockerfile: Dockerfile
      # 跨平台构建：Apple Silicon 可取消下行注释
      # platforms:
      #   - linux/amd64
    image: survey-admin-backend:latest
    container_name: survey-admin-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8081}:8080"
    environment:
      TZ: Asia/Shanghai
      # 数据库配置
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME:-survey_db}
      DB_USERNAME: ${DB_USERNAME:-survey_user}
      DB_PASSWORD: ${DB_PASSWORD:-survey_password}
      DB_USE_SSL: ${DB_USE_SSL:-false}
      # Redis配置
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
      # JWT配置
      JWT_SECRET: ${JWT_SECRET:-survey-jwt-secret-key-change-in-production-2026}
      JWT_EXPIRATION: "7200000"
      JWT_REFRESH_EXPIRATION: "604800000"
      # CORS配置
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000,http://localhost:9527,http://localhost:9528}
      # 应用环境（与 Dockerfile 中 --spring.profiles.active=prod 一致）
      APP_ENV: prod
      SPRING_PROFILES_ACTIVE: prod
      # OSS配置（可选，未配置时使用本地存储）
      OSS_ENDPOINT: ${OSS_ENDPOINT:-}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID:-}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET:-}
      OSS_BUCKET_NAME: ${OSS_BUCKET_NAME:-survey-images}
      # 短信服务配置（可选）
      ALIYUN_SMS_ENABLED: "${ALIYUN_SMS_ENABLED:-false}"
      ALIYUN_SMS_ACCESS_KEY_ID: ${ALIYUN_SMS_ACCESS_KEY_ID:-}
      ALIYUN_SMS_ACCESS_KEY_SECRET: ${ALIYUN_SMS_ACCESS_KEY_SECRET:-}
      ALIYUN_SMS_SIGN_NAME: ${ALIYUN_SMS_SIGN_NAME:-}
      ALIYUN_SMS_TEMPLATE_CODE: ${ALIYUN_SMS_TEMPLATE_CODE:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend-logs:/app/logs
    networks:
      - survey-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '${BACKEND_CPU_LIMIT:-2.0}'
          memory: ${BACKEND_MEM_LIMIT:-1024M}
        reservations:
          cpus: '${BACKEND_CPU_RESERVE:-0.5}'
          memory: ${BACKEND_MEM_RESERVE:-512M}

  # ========================================
  # PC 管理后台（开发环境）
  # ========================================
  admin-web:
    build:
      context: ./admin-web-soybean
      dockerfile: Dockerfile.dev
    image: survey-admin-web-dev:latest
    container_name: survey-admin-web
    restart: unless-stopped
    ports:
      - "${ADMIN_WEB_PORT:-9527}:9527"
    environment:
      TZ: Asia/Shanghai
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./admin-web-soybean:/app
      - admin-web-node-modules:/app/node_modules
    depends_on:
      admin-backend:
        condition: service_healthy
    networks:
      - survey-network

  # ========================================
  # 移动端 H5（开发环境）
  # ========================================
  mobile-app:
    build:
      context: ./mobile-app
      dockerfile: Dockerfile.dev
    image: survey-mobile-app-dev:latest
    container_name: survey-mobile-app
    restart: unless-stopped
    ports:
      - "${MOBILE_WEB_PORT:-3000}:3000"
    environment:
      TZ: Asia/Shanghai
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./mobile-app:/app
      - mobile-app-node-modules:/app/node_modules
    depends_on:
      admin-backend:
        condition: service_healthy
    networks:
      - survey-network

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  backend-logs:
    driver: local
  admin-web-node-modules:
    driver: local
  mobile-app-node-modules:
    driver: local

networks:
  survey-network:
    driver: bridge
