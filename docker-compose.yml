services:
  # ========================================
  # MySQL 数据库
  # ========================================
  mysql:
    image: mysql:8.0
    container_name: survey-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-survey_db}
      MYSQL_CHARSET: utf8mb4
      MYSQL_USER: ${DB_USERNAME:-survey_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-survey_password}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-sql:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max-connections=200
      - --innodb-buffer-pool-size=256M
    networks:
      - survey-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ========================================
  # Redis 缓存
  # ========================================
  redis:
    image: redis:7-alpine
    container_name: survey-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password} --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - survey-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ========================================
  # 后端服务
  # ========================================
  admin-backend:
    build:
      context: ./admin-backend
      dockerfile: Dockerfile
    container_name: survey-admin-backend
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      # 数据库配置
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-survey_db}
      - DB_USERNAME=${DB_USERNAME:-survey_user}
      - DB_PASSWORD=${DB_PASSWORD:-survey_password}
      # Redis配置
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_password}
      # JWT配置
      - JWT_SECRET=${JWT_SECRET:-survey-jwt-secret-key-change-in-production-2026}
      - JWT_EXPIRATION=7200000
      - JWT_REFRESH_EXPIRATION=604800000
      # CORS配置
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000,http://localhost:8081,http://localhost:9527,http://localhost:9528
      # 应用环境
      - APP_ENV=dev
      # OSS配置（可选，未配置时使用本地存储）
      - OSS_ENDPOINT=${OSS_ENDPOINT:-}
      - OSS_ACCESS_KEY_ID=${OSS_ACCESS_KEY_ID:-}
      - OSS_ACCESS_KEY_SECRET=${OSS_ACCESS_KEY_SECRET:-}
      - OSS_BUCKET_NAME=${OSS_BUCKET_NAME:-survey-images}
      # 短信服务配置（可选）
      - ALIYUN_SMS_ENABLED=${ALIYUN_SMS_ENABLED:-false}
      - ALIYUN_SMS_ACCESS_KEY_ID=${ALIYUN_SMS_ACCESS_KEY_ID:-}
      - ALIYUN_SMS_ACCESS_KEY_SECRET=${ALIYUN_SMS_ACCESS_KEY_SECRET:-}
      - ALIYUN_SMS_SIGN_NAME=${ALIYUN_SMS_SIGN_NAME:-}
      - ALIYUN_SMS_TEMPLATE_CODE=${ALIYUN_SMS_TEMPLATE_CODE:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - survey-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 512M

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local

networks:
  survey-network:
    driver: bridge
