<text x="188" y="230" fill="white" font-size="28" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-weight="700">青泓项目勘察管理后台</text>
<text x="188" y="274" fill="#DCE9FF" font-size="18" font-family="Microsoft YaHei, PingFang SC, sans-serif">围绕项目管理、动态模板、点位地图、审核闭环与报表导出的统一工作台</text>
<rect x="188" y="340" width="554" height="178" rx="26" fill="#FFFFFF18" stroke="#FFFFFF2A"/>
<text x="224" y="390" fill="white" font-size="22" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-weight="700">进入系统后可直接处理的工作</text>
