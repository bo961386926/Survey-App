<text x="1232" y="598" text-anchor="middle" fill="#1664FF" font-size="15" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-weight="700">获取验证码</text>
<rect x="970" y="660" width="342" height="62" rx="20" fill="#1664FF"/>
<text x="1141" y="699" text-anchor="middle" fill="white" font-size="18" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-weight="700">登录系统</text>
<text x="970" y="760" fill="#606266" font-size="14" font-family="Microsoft YaHei, PingFang SC, sans-serif">支持账号密码登录与短信验证码登录</text>
<text x="970" y="792" fill="#606266" font-size="14" font-family="Microsoft YaHei, PingFang SC, sans-serif">第三方协作入口可使用受限链接或小程序码进入</text>
<rect x="970" y="836" width="342" height="82" rx="20" fill="#F7FAFE"/>
<text x="998" y="872" fill="#1F2D3D" font-size="15" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-weight="700">安全提示</text>
<text x="998" y="902" fill="#606266" font-size="13" font-family="Microsoft YaHei, PingFang SC, sans-serif">敏感导出、权限变更等操作均记录日志并支持风控拦截</text>
