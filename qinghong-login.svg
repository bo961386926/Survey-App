<text x="224" y="668" fill="white" font-size="22" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-weight="700">系统入口提示</text>
<text x="224" y="716" fill="#DCE9FF" font-size="16" font-family="Microsoft YaHei, PingFang SC, sans-serif">管理员：项目、模板、权限与导出</text>
<text x="224" y="758" fill="#DCE9FF" font-size="16" font-family="Microsoft YaHei, PingFang SC, sans-serif">审核员：审核反馈、版本对比、PDF 生成</text>
<text x="224" y="800" fill="#DCE9FF" font-size="16" font-family="Microsoft YaHei, PingFang SC, sans-serif">采集协同：点位查看、协助填报、短期 Token</text>
<rect x="922" y="230" width="438" height="570" rx="32" fill="#FFFFFF" stroke="#E4EAF3"/>
