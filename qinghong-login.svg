<svg width="1600" height="1120" viewBox="0 0 1600 1120" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1120" gradientUnits="userSpaceOnUse">
<stop stop-color="#DCEBFF"/>
<stop offset="1" stop-color="#F4F8FC"/>
</linearGradient>
<linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
<stop stop-color="#1664FF"/>
<stop offset="1" stop-color="#4D90FF"/>
</linearGradient>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
<feDropShadow dx="0" dy="20" stdDeviation="26" flood-color="#7FA5E355"/>
</filter>
</defs>
<rect width="1600" height="1120" fill="url(#bg)"/>
<circle cx="254" cy="202" r="190" fill="#E7F0FF"/>
<circle cx="1420" cy="930" r="220" fill="#EAF3FF"/>
<rect x="120" y="124" width="1360" height="872" rx="40" fill="#FFFFFF" filter="url(#shadow)"/>
