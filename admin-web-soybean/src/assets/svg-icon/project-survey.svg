<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" role="img" aria-label="勘察项目">
  <!-- 外层圆环 - 代表勘察范围 -->
  <circle cx="12" cy="12" r="10" stroke="#475569" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.4"/>
  <!-- 定位针主体 -->
  <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="#3B82F6" opacity="0.15" stroke="#3B82F6" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- 中心实心圆 - 代表核心点位 -->
  <circle cx="12" cy="9" r="2.5" fill="#3B82F6"/>
  <!-- 十字准星横线 -->
  <line x1="8" y1="9" x2="10.2" y2="9" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="13.8" y1="9" x2="16" y2="9" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>
  <!-- 十字准星竖线 -->
  <line x1="12" y1="6.5" x2="12" y2="8" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12" y1="10" x2="12" y2="11.5" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>
  <!-- 底部小圆点 - 代表数据点 -->
  <circle cx="8.5" cy="5.5" r="1" fill="#475569" opacity="0.5"/>
  <circle cx="15.5" cy="4.5" r="0.8" fill="#475569" opacity="0.4"/>
  <circle cx="17" cy="7" r="0.6" fill="#475569" opacity="0.3"/>
</svg>