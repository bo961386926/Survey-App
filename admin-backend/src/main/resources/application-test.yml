# 测试环境配置 — 指向 Docker Compose 提供的基础设施

server:
  port: 0  # 随机端口，避免与本机服务冲突

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/survey_db?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: survey_user
    password: survey_password
    druid:
      initial-size: 2
      min-idle: 2
      max-active: 10
      test-on-borrow: true
      validation-query: SELECT 1
  # Redis — 直接连接 Docker Redis
  data:
    redis:
      host: localhost
      port: 6379
      password: redis_password
      database: 1  # 使用 DB1 避免污染生产数据
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2
          max-wait: 3000ms
        shutdown-timeout: 200ms

# JWT配置
jwt:
  secret: test-jwt-secret-key-for-integration-tests-only
  expiration: 7200000
  refresh-expiration: 604800000

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.qhiot.survey.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: assign_id

# 关闭接口文档
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

knife4j:
  enable: false

# 日志配置
logging:
  level:
    com.qhiot.survey: debug
    root: warn

# CORS
cors:
  allowed-origins: "*"

# 应用环境
app:
  env: test

# 阿里云配置 — 测试环境不使用真实服务
aliyun:
  oss:
    endpoint: ""
    access-key-id: ""
    access-key-secret: ""
    bucket-name: survey-test
    folder: survey/
  sms:
    enabled: false
    access-key-id: ""
    access-key-secret: ""
    sign-name: ""
    template-code: ""
    endpoint: dysmsapi.aliyuncs.com
