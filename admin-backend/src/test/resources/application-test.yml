server:
  port: 0  # 随机端口

spring:
  application:
    name: survey-admin-test
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:test-data.sql
      continue-on-error: true
  data:
    redis:
      # 使用嵌入式Redis或Mock
      host: localhost
      port: 6379

jwt:
  secret: test-secret-key-for-testing-purposes-only-12345678
  expiration: 7200000
  refresh-expiration: 604800000

mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.qhiot.survey.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 禁用阿里云短信（使用Mock）
aliyun:
  sms:
    enabled: false
  oss:
    endpoint: oss-cn-hangzhou.aliyuncs.com
    access-key-id: test-access-key
    access-key-secret: test-access-secret
    bucket-name: test-bucket
    folder: test/

logging:
  level:
    com.qhiot.survey: debug
    root: warn
