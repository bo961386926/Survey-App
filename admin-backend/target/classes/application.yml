server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true
      force-response: true

# JWT配置
jwt:
  secret: ${JWT_SECRET:survey-system-secret-key-2024-survey-system-secret-key-2024}
  expiration: ${JWT_EXPIRATION:7200000} # 2小时
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7天

spring:
  application:
    name: survey-admin
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB        # 单个文件最大10MB
      max-request-size: 50MB     # 请求总大小最大50MB
      file-size-threshold: 2KB   # 超过2KB写入磁盘
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:survey_db}?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai&useSSL=${DB_USE_SSL:false}&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      test-on-borrow: true
      # 连接泄漏检测
      remove-abandoned: true
      remove-abandoned-timeout: 1800
      log-abandoned: true
      # 慢SQL记录
      filter:
        stat:
          enabled: true
          slow-sql-millis: 2000
          log-slow-sql: true
  # 邮件配置（密码下发兜底通道；未配置 host 时邮件服务自动降级为 Mock 模式）
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    from: ${MAIL_FROM:${MAIL_USERNAME:no-reply@qhiot.com}}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: ${MAIL_STARTTLS:true}
          ssl:
            enable: ${MAIL_SSL:true}
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis_password}
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20        # 最大连接数
          max-idle: 10          # 最大空闲连接
          min-idle: 5           # 最小空闲连接
          max-wait: 3000ms      # 最大等待时间
        shutdown-timeout: 200ms # 关闭超时

mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.qhiot.survey.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  # 全局配置
  global-config:
    db-config:
      # 逻辑删除配置
      logic-delete-field: isDeleted  # 全局逻辑删除字段名
      logic-delete-value: 1          # 逻辑已删除值
      logic-not-delete-value: 0      # 逻辑未删除值
      # 主键类型
      id-type: assign_id

# Aliyun OSS 配置
aliyun:
  oss:
    endpoint: oss-cn-hangzhou.aliyuncs.com
    access-key-id: ${OSS_ACCESS_KEY_ID:your-access-key-id}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:your-access-key-secret}
    bucket-name: ${OSS_BUCKET_NAME:survey-images}
    folder: survey/
  # 阿里云短信配置（可选，生产环境使用）
  # 注意：设置 enabled=true 前，请先在阿里云开通短信服务并创建签名和模板
  sms:
    enabled: ${ALIYUN_SMS_ENABLED:false}  # 是否启用阿里云短信（默认false，使用Mock模式）
    access-key-id: ${ALIYUN_SMS_ACCESS_KEY_ID:your-access-key-id}
    access-key-secret: ${ALIYUN_SMS_ACCESS_KEY_SECRET:your-access-key-secret}
    sign-name: ${ALIYUN_SMS_SIGN_NAME:青泓勘察}  # 短信签名
    template-code: ${ALIYUN_SMS_TEMPLATE_CODE:SMS_123456789}  # 短信模板代码（验证码）
    password-template-code: ${ALIYUN_SMS_PWD_TEMPLATE_CODE:${ALIYUN_SMS_TEMPLATE_CODE:SMS_123456789}}  # 密码下发模板代码（建议单独申请）
    endpoint: dysmsapi.aliyuncs.com

# Knife4j接口文档配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
  setting:
    language: zh_cn
    swagger-model-name: 实体类列表

logging:
  level:
    com.qhiot.survey: debug
    root: info

# CORS配置
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}  # 生产环境建议配置具体域名，多个域名用逗号分隔

# 应用环境配置
app:
  env: ${APP_ENV:prod}  # dev/test/prod
  # 安全相关配置
  security:
    password-reset:
      user-per-hour: ${PWD_RESET_USER_PER_HOUR:3}    # 单用户每小时被重置上限
      admin-per-hour: ${PWD_RESET_ADMIN_PER_HOUR:10} # 单管理员每小时触发上限
  notification:
    email:
      from-name: ${MAIL_FROM_NAME:青泓勘察系统}
